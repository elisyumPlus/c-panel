<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Command Center | Cinematic Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@200;400&display=swap');

        :root {
            --bg-base: #030305;
            --cyan-glow: #00f2ff;
            --magenta-glow: #ff00ea;
            --warning-gold: #ffcc00;
            --danger-red: #ff1a1a;
            --glass-panel: rgba(5, 10, 20, 0.85);
            --border-ui: rgba(0, 242, 255, 0.15);
            --font-ui: 'Space Grotesk', sans-serif;
            --font-title: 'Syncopate', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: #a0a5b5;
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Scanline Efekti */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .terminal-frame {
            width: 96vw;
            height: 92vh;
            border: 1px solid var(--border-ui);
            background: var(--glass-panel);
            backdrop-filter: blur(50px);
            display: grid;
            grid-template-rows: 100px 1fr 100px;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
        }

        /* --- Header: Branding & Data Ring --- */
        header {
            padding: 0 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-ui);
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .data-ring {
            width: 50px;
            height: 50px;
            border: 2px dashed var(--cyan-glow);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
            position: relative;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .brand-text h1 {
            font-family: var(--font-title);
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 4px;
        }

        .brand-text span {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--cyan-glow);
            opacity: 0.8;
        }

        /* --- Middle Layout --- */
        .viewport {
            display: grid;
            grid-template-columns: 420px 1fr 320px;
            overflow: hidden;
        }

        /* --- Sidebar: Modules & Analytics --- */
        .sidebar {
            padding: 40px;
            border-right: 1px solid var(--border-ui);
            display: flex;
            flex-direction: column;
            gap: 35px;
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.02) 0%, transparent 100%);
        }

        .widget {
            position: relative;
        }

        .widget-label {
            font-size: 0.65rem;
            font-family: var(--font-title);
            color: #555;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .gauge-container {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .gauge-fill {
            height: 100%;
            background: var(--cyan-glow);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.1, 0.7, 0.1, 1);
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        .data-value {
            font-family: var(--font-data);
            font-size: 2rem;
            color: #fff;
            margin: 10px 0;
        }

        /* --- Log Terminal --- */
        .log-vessel {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
        }

        .log-stream {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            font-family: var(--font-data);
            font-size: 0.8rem;
            scroll-behavior: smooth;
        }

        .log-entry {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            padding: 10px;
            border-left: 1px solid transparent;
            transition: all 0.3s;
            animation: glitchIn 0.3s ease-out forwards;
        }

        @keyframes glitchIn {
            0% { opacity: 0; transform: skewX(20deg); }
            100% { opacity: 1; transform: skewX(0deg); }
        }

        .log-entry:hover {
            background: rgba(255,255,255,0.02);
            border-left: 1px solid var(--cyan-glow);
        }

        .tag { font-weight: 700; color: #555; }
        .tag.active { color: var(--cyan-glow); }
        .msg { color: #ccc; }

        /* --- Right Panel: System Nodes --- */
        .node-map {
            padding: 30px;
            border-left: 1px solid var(--border-ui);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .node {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-led {
            width: 4px; height: 12px; background: #222;
        }
        .online { background: var(--cyan-glow); box-shadow: 0 0 10px var(--cyan-glow); }

        /* --- Footer: Kinetic Actions --- */
        footer {
            padding: 0 50px;
            border-top: 1px solid var(--border-ui);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 25px;
        }

        .cmd-btn {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: #fff;
            padding: 12px 35px;
            font-family: var(--font-title);
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .cmd-btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .cmd-btn:hover::before { left: 100%; }

        .cmd-btn:hover {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .btn-reboot { color: var(--cyan-glow); border-color: var(--cyan-glow); }
        .btn-reboot:hover { background: var(--cyan-glow); color: #000; box-shadow: 0 0 30px var(--cyan-glow); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan-glow); }
    </style>
</head>
<body>

<div class="terminal-frame">
    <header>
        <div class="brand-group">
            <div class="data-ring"></div>
            <div class="brand-text">
                <h1>SYNTHETIC COMMAND</h1>
                <span>UNIT_ID: 0X-FF4900 / CLOUD_ACTIVE</span>
            </div>
        </div>
        <div style="font-family: var(--font-data); font-size: 0.8rem; text-align: right;">
            <div id="sys-time">00:00:00</div>
            <div style="color: #444; font-size: 0.65rem;">ENCRYPT: SHA-512_SECURE</div>
        </div>
    </header>

    <div class="viewport">
        <!-- Sol Analiz Bölümü -->
        <div class="sidebar">
            <div class="widget">
                <div class="widget-label">CORE_STATUS <span>01</span></div>
                <div class="data-value" id="status-text">BOOTING</div>
                <div class="gauge-container"><div id="status-bar" class="gauge-fill"></div></div>
            </div>

            <div class="widget">
                <div class="widget-label">CPU_OPTIMIZATION <span>02</span></div>
                <div class="data-value" id="cpu-load">0.00%</div>
                <div class="gauge-container"><div id="cpu-bar" class="gauge-fill" style="background: var(--magenta-glow);"></div></div>
            </div>

            <div class="widget">
                <div class="widget-label">DATA_THROUGHPUT <span>03</span></div>
                <div style="display: flex; align-items: baseline; gap: 10px;">
                    <span class="data-value">4.8</span>
                    <span style="font-size: 0.7rem;">TB/S</span>
                </div>
            </div>
        </div>

        <!-- Ana Terminal -->
        <div class="log-vessel">
            <div class="log-stream" id="terminal"></div>
        </div>

        <!-- Sağ Modül Listesi -->
        <div class="node-map">
            <div style="font-family: var(--font-title); font-size: 0.55rem; color: #555; letter-spacing: 3px; margin-bottom: 10px;">SUBSYSTEM_NODES</div>
            <div class="node">NETWORK_MESH <div class="status-led" id="led-0"></div></div>
            <div class="node">NEURAL_ENGINE <div class="status-led" id="led-1"></div></div>
            <div class="node">LOGIC_GATE_X <div class="status-led" id="led-2"></div></div>
            <div class="node">REMOTE_BRIDGE <div class="status-led" id="led-3"></div></div>
            <div class="node">STORAGE_CELL <div class="status-led" id="led-4"></div></div>
            <div class="node">CRYPT_STREAMS <div class="status-led" id="led-5"></div></div>
        </div>
    </div>

    <footer>
        <button class="cmd-btn" onclick="abort()">ABORT_SYS</button>
        <button class="cmd-btn btn-reboot" onclick="reboot()">RE_INITIALIZE</button>
    </footer>
</div>

<script>
    const term = document.getElementById('terminal');
    const cpuVal = document.getElementById('cpu-load');
    const cpuBar = document.getElementById('cpu-bar');
    const statusBar = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const sysTime = document.getElementById('sys-time');

    let active = true;
    const sequences = [
        "Sistem çekirdeği (v.8.0.0) yükleniyor...",
        "Quantum-Link katmanı el sıkışması başlatıldı.",
        "Şifreleme anahtarları (RSA-4096) yükleniyor.",
        "Yerel ağda 4 aktif düğüm tespit edildi.",
        "Bellek adresleme (128-bit) moduna geçildi.",
        "Mikroservis katmanı senkronizasyonu bekleniyor.",
        "Firewall kuralları (L7) aktif edildi.",
        "Veritabanı kümesi (Sharded) bağlandı.",
        "Yük dengeleyici: Trafik port 443'e yönlendirildi.",
        "SİSTEM ÇALIŞMAYA HAZIR. ERİŞİM ONAYLANDI."
    ];

    function log(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<span class="tag active">[SYS]</span> <span class="msg">${msg}</span>`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function init() {
        active = true;
        term.innerHTML = '';
        statusText.innerText = "LOADING";
        statusText.style.color = "var(--warning-gold)";
        statusBar.style.width = "0%";

        for(let i=0; i<sequences.length; i++) {
            if(!active) break;
            log(sequences[i]);
            
            // Progress ve LED simülasyonu
            const prog = ((i + 1) / sequences.length) * 100;
            statusBar.style.width = `${prog}%`;
            
            if(i % 2 === 0 && i/2 < 6) {
                document.getElementById(`led-${i/2}`).classList.add('online');
            }

            await new Promise(r => setTimeout(r, Math.random() * 600 + 400));
        }

        if(active) {
            statusText.innerText = "ACTIVE";
            statusText.style.color = "var(--cyan-glow)";
        }
    }

    function updateLiveStats() {
        if(!active) return;
        const load = (Math.random() * 20 + 5).toFixed(2);
        cpuVal.innerText = `${load}%`;
        cpuBar.style.width = `${load}%`;
        sysTime.innerText = new Date().toLocaleTimeString();
    }

    function abort() {
        active = false;
        statusText.innerText = "ABORTED";
        statusText.style.color = "var(--danger-red)";
        log("DURDURMA: Kritik işlem kullanıcı tarafından sonlandırıldı.");
        document.querySelectorAll('.status-led').forEach(l => l.classList.remove('online'));
    }

    function reboot() {
        active = false;
        document.querySelectorAll('.status-led').forEach(l => l.classList.remove('online'));
        setTimeout(init, 500);
    }

    setInterval(updateLiveStats, 1000);
    window.onload = init;
</script>

</body>
</html>
