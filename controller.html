<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith v12.0 - Ethereal Prism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600;800&family=JetBrains+Mono:wght@100;400&display=swap');

        :root {
            --bg: #f8f9fc;
            --glass: rgba(255, 255, 255, 0.7);
            --accent-tr: #ff5e7d;
            --accent-ch: #ff9f0a; /* Isviçre için ısı artışını simgeleyen turuncu tonu */
            --text-main: #1c1c1e;
            --text-dim: #8e8e93;
            --border: rgba(255, 255, 255, 0.8);
            --shadow: rgba(142, 142, 147, 0.15);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Aura Background Elements --- */
        .aura {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: moveAura 20s ease-in-out infinite alternate;
        }
        .aura-1 { top: -20%; left: -10%; background: radial-gradient(circle, var(--accent-tr), transparent); }
        .aura-2 { bottom: -20%; right: -10%; background: radial-gradient(circle, var(--accent-ch), transparent); }

        @keyframes moveAura {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        .container {
            width: 94vw;
            height: 92vh;
            display: grid;
            grid-template-rows: 70px 1fr;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        /* --- Minimalist Glass Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            box-shadow: 0 10px 30px var(--shadow);
        }

        .logo-box h1 {
            font-size: 1rem;
            letter-spacing: 0.4em;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .clock-digital {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-main);
        }

        /* --- Layout Structures --- */
        .grid-master {
            display: grid;
            grid-template-columns: 1fr 1fr 380px;
            gap: 25px;
        }

        /* --- Ethereal Prism Cards --- */
        .prism-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(40px);
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .prism-card:hover {
            transform: scale(1.01) translateY(-5px);
        }

        .card-meta {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; }

        .region-name {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        /* --- Metrics Display --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-tile {
            background: rgba(255,255,255,0.4);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .m-title { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }
        .m-num { font-size: 2.5rem; font-family: var(--font-main); font-weight: 300; }
        .m-num small { font-size: 0.9rem; font-weight: 600; color: var(--text-dim); }

        /* --- Progress Bars --- */
        .p-track { height: 4px; background: rgba(0,0,0,0.03); margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; transition: width 1.5s ease; }

        .tr-theme .status-dot { background: var(--accent-tr); box-shadow: 0 0 10px var(--accent-tr); }
        .tr-theme .p-fill { background: var(--accent-tr); }
        .ch-theme .status-dot { background: var(--accent-ch); box-shadow: 0 0 10px var(--accent-ch); }
        .ch-theme .p-fill { background: var(--accent-ch); }

        /* --- Console: Crystal Panel --- */
        .crystal-panel {
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid var(--border);
            padding: 35px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(40px);
            box-shadow: 10px 10px 30px var(--shadow);
        }

        .panel-head { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 25px; }

        .log-area {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-main);
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, black 85%, transparent);
        }

        .log-line {
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            display: flex;
            gap: 12px;
        }
        .log-line b { font-weight: 600; color: var(--text-dim); }

        /* --- Visualizers --- */
        .viz-box { height: 100px; margin-top: auto; border-radius: 0 0 40px 40px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div class="aura aura-1"></div>
<div class="aura aura-2"></div>

<div class="container">
    <header>
        <div class="logo-box">
            <h1>Zenith // Prism v12</h1>
        </div>
        <div class="clock-digital" id="clock">00:00:00</div>
    </header>

    <div class="grid-master">
        <!-- TR Node -->
        <div class="prism-card tr-theme">
            <div class="card-meta"><div class="status-dot"></div> Bölge TR-IST-01</div>
            <h2 class="region-name">Boğaz<br>Akışı</h2>
            
            <div class="metrics-grid">
                <div class="metric-tile">
                    <div class="m-title">İŞLEMCİ YOĞUNLUĞU</div>
                    <div class="m-num" id="tr-cpu">94<small>%</small></div>
                    <div class="p-track"><div id="tr-cpu-bar" class="p-fill"></div></div>
                </div>
                <div class="metric-tile">
                    <div class="m-title">SICAKLIK</div>
                    <div class="m-num" id="tr-temp">76<small>°C</small></div>
                </div>
            </div>

            <div class="viz-box"><canvas id="tr-canvas"></canvas></div>
        </div>

        <!-- CH Node -->
        <div class="prism-card ch-theme">
            <div class="card-meta"><div class="status-dot"></div> Bölge CH-ZRH-02</div>
            <h2 class="region-name">Alp<br>Kristali</h2>

            <div class="metrics-grid">
                <div class="metric-tile">
                    <div class="m-title">KUANTUM YÜKÜ</div>
                    <div class="m-num" id="ch-cpu">48<small>%</small></div>
                    <div class="p-track"><div id="ch-cpu-bar" class="p-fill"></div></div>
                </div>
                <div class="metric-tile">
                    <div class="m-title">SİSTEM ISISI</div>
                    <div class="m-num" id="ch-temp">50<small>°C</small></div>
                </div>
            </div>

            <div class="viz-box"><canvas id="ch-canvas"></canvas></div>
        </div>

        <!-- Terminal Panel -->
        <div class="crystal-panel">
            <div class="panel-head">PRISM_ÇEKİRDEK_AKŞI</div>
            <div class="log-area" id="logs"></div>
        </div>
    </div>
</div>

<script>
    const logArea = document.getElementById('logs');
    const clock = document.getElementById('clock');

    function addLog(origin, msg, color) {
        const time = new Date().toLocaleTimeString('tr-TR', { hour12: false });
        const div = document.createElement('div');
        div.className = 'log-line';
        div.innerHTML = `<b>${time}</b> <span style="color: ${color}">[${origin}]</span> ${msg}`;
        logArea.prepend(div);
        if(logArea.children.length > 20) logArea.lastChild.remove();
    }

    function initWave(id, color) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        let t = 0;

        function draw() {
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.3;

            const amp = id.includes('tr') ? 20 : 15; // Isı artışıyla CH dalgaları da hareketlendi
            const freq = id.includes('tr') ? 0.04 : 0.03;

            for(let x = 0; x < canvas.offsetWidth; x++) {
                const y = canvas.offsetHeight/2 + Math.sin(x * freq + t) * amp;
                if(x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            t += id.includes('tr') ? 0.08 : 0.06;
            requestAnimationFrame(draw);
        }
        draw();
    }

    function updateStats() {
        // TR: Klasik yoğunluk
        const trC = Math.floor(Math.random() * 5 + 90);
        document.getElementById('tr-cpu').innerHTML = trC + '<small>%</small>';
        document.getElementById('tr-cpu-bar').style.width = trC + '%';
        document.getElementById('tr-temp').innerHTML = (74 + Math.floor(Math.random()*4)) + '<small>°C</small>';

        // CH: İstenilen 50 derece seviyeleri ve artan yük
        const chC = Math.floor(Math.random() * 10 + 45);
        document.getElementById('ch-cpu').innerHTML = chC + '<small>%</small>';
        document.getElementById('ch-cpu-bar').style.width = chC + '%';
        // 49-52 derece arası dalgalanma
        document.getElementById('ch-temp').innerHTML = (49 + Math.floor(Math.random()*4)) + '<small>°C</small>';

        clock.innerText = new Date().toLocaleTimeString('tr-TR');

        if(Math.random() > 0.8) {
            const ev = Math.random() > 0.5 ? 
                {r: "TR-IST", m: "Yüksek yoğunluklu trafik.", c: "var(--accent-tr)"} : 
                {r: "CH-ZRH", m: "Termal sızıntı saptandı! Soğutma dışı.", c: "var(--accent-ch)"};
            addLog(ev.r, ev.m, ev.c);
        }
    }

    window.onload = () => {
        initWave('tr-canvas', '#ff5e7d');
        initWave('ch-canvas', '#ff9f0a');
        addLog("SYSTEM", "Ethereal Prism arayüzü başlatıldı.", "#1c1c1e");
        addLog("WARNING", "CH-ZRH Düğümü kritik ısı seviyesinde (50°C+).", "var(--accent-ch)");
        setInterval(updateStats, 2000);
        updateStats();
    };
</script>

</body>
</html>
